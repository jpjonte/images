name: Build a php-family image

# Reusable workflow: builds one php-family image (php or frankenphp) multi-arch by
# digest and publishes the merged manifest. Callers decide WHEN to run it
# (build.yml on push, rebuild.yml on a weekly schedule), so this workflow itself
# carries no event/scheduling logic.

on:
  workflow_call:
    inputs:
      name:
        description: 'Image name under the namespace (e.g. php or frankenphp). Also the source directory.'
        required: true
        type: string
      version:
        description: 'PHP version / image tag and source subdirectory (e.g. 8.5).'
        required: false
        type: string
        default: '8.5'

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: ghcr.io/jpjonte

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.name }}/${{ inputs.version }}/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.NAMESPACE }}/${{ inputs.name }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Sanitize platform for artifact name
        id: sanitize
        run: echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.name }}-${{ inputs.version }}-digest-${{ steps.sanitize.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.name }}-${{ inputs.version }}-digest-*
          merge-multiple: true
          path: /tmp/digests
      - name: Validate digest count
        run: |
          digest_count=$(find /tmp/digests -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$digest_count" -lt 2 ]; then
            echo "Only $digest_count digest(s) for ${{ inputs.name }} ${{ inputs.version }} — need at least 2 for multi-arch." >&2
            echo "Refusing to publish a single-arch manifest under a multi-arch tag." >&2
            exit 1
          fi
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.NAMESPACE }}/${{ inputs.name }}:${{ inputs.version }} \
            $(printf '${{ env.NAMESPACE }}/${{ inputs.name }}@sha256:%s ' *)
      - name: Inspect published manifest
        run: |
          docker buildx imagetools inspect ${{ env.NAMESPACE }}/${{ inputs.name }}:${{ inputs.version }}
