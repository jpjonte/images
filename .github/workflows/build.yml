name: Build Docker images

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version to build (e.g. 3.41.1). Tags as both stable and version. Leave empty to build stable only.'
        required: false

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: ghcr.io/jpjonte

jobs:
  # ── Detect changed paths (push only) ─────────────────────────────
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      flutter: ${{ steps.filter.outputs.flutter }}
      php-8_4: ${{ steps.filter.outputs.php-8_4 }}
      php-8_5: ${{ steps.filter.outputs.php-8_5 }}
      frankenphp-8_5: ${{ steps.filter.outputs.frankenphp-8_5 }}
      kubectl: ${{ steps.filter.outputs.kubectl }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            flutter:
              - 'flutter/**'
            php-8_4:
              - 'php/8.4/**'
              - 'php/scripts/**'
            php-8_5:
              - 'php/8.5/**'
              - 'php/scripts/**'
            frankenphp-8_5:
              - 'frankenphp/8.5/**'
              - 'php/scripts/**'
            kubectl:
              - 'kubectl/**'

  # ── Check for new Flutter stable version (schedule only) ─────────
  check-flutter:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check latest Flutter stable version
        id: check
        run: |
          VERSION=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json \
            | jq -r '.current_release.stable as $h | .releases[] | select(.hash==$h) | .version')
          echo "Latest stable Flutter version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if docker manifest inspect ${{ env.NAMESPACE }}/flutter:$VERSION > /dev/null 2>&1; then
            echo "Flutter $VERSION already exists in GHCR"
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New Flutter version: $VERSION"
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  # ── Flutter (per-platform build) ────────────────────────────────
  build-flutter:
    needs: [changes, check-flutter]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.flutter == 'true') ||
        (github.event_name == 'schedule' && needs.check-flutter.outputs.build == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine version
        id: version
        run: |
          VERSION="${{ needs.check-flutter.outputs.version || inputs.flutter_version }}"
          echo "version=${VERSION:-stable}" >> "$GITHUB_OUTPUT"
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: flutter/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            FLUTTER_VERSION=${{ steps.version.outputs.version }}
          outputs: type=image,name=${{ env.NAMESPACE }}/flutter,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Flutter (merge multi-arch manifest) ────────────────────────
  merge-flutter:
    needs: [build-flutter]
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: flutter-digest-*
          merge-multiple: true
          path: /tmp/digests
      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.NAMESPACE }}/flutter:stable"
          VERSION="${{ needs.build-flutter.outputs.version }}"
          if [[ -n "$VERSION" && "$VERSION" != "stable" ]]; then
            TAGS="${TAGS},${{ env.NAMESPACE }}/flutter:${VERSION}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          TAGS=$(echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | sed 's/^/-t /' | tr '\n' ' ')
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.NAMESPACE }}/flutter@sha256:%s ' *)

  # ── PHP (per-platform build) ────────────────────────────────────
  build-php:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && (needs.changes.outputs.php-8_4 == 'true' || needs.changes.outputs.php-8_5 == 'true')) ||
        github.event_name == 'workflow_dispatch'
      )
    strategy:
      fail-fast: false
      matrix:
        version: ['8.4', '8.5']
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
        exclude:
          - version: ${{ github.event_name == 'push' && needs.changes.outputs.php-8_4 != 'true' && '8.4' || 'never' }}
          - version: ${{ github.event_name == 'push' && needs.changes.outputs.php-8_5 != 'true' && '8.5' || 'never' }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: php/${{ matrix.version }}/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.NAMESPACE }}/php,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Sanitize platform for artifact name
        id: sanitize
        run: echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: php-${{ matrix.version }}-digest-${{ steps.sanitize.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── PHP (merge multi-arch manifest) ─────────────────────────────
  merge-php:
    needs: [build-php]
    if: |
      always() && needs.build-php.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['8.4', '8.5']
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: php-${{ matrix.version }}-digest-*
          merge-multiple: true
          path: /tmp/digests
      - name: Validate digest count
        run: |
          digest_count=$(find /tmp/digests -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$digest_count" -eq 0 ]; then
            echo "No digests for PHP ${{ matrix.version }} — build-php was skipped by change detection."
            exit 0
          fi
          if [ "$digest_count" -lt 2 ]; then
            echo "Only $digest_count digest for PHP ${{ matrix.version }} — need at least 2 for multi-arch." >&2
            echo "Refusing to publish a single-arch manifest under a multi-arch tag." >&2
            exit 1
          fi
          echo "has_digests=true" >> "$GITHUB_ENV"
      - name: Create multi-arch manifest
        if: env.has_digests == 'true'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.NAMESPACE }}/php:${{ matrix.version }} \
            $(printf '${{ env.NAMESPACE }}/php@sha256:%s ' *)
      - name: Inspect published manifest
        if: env.has_digests == 'true'
        run: |
          docker buildx imagetools inspect ${{ env.NAMESPACE }}/php:${{ matrix.version }}

    # ── FrankenPHP (per-platform build) ────────────────────────────────────
  build-frankenphp:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && (needs.changes.outputs.frankenphp-8_5 == 'true')) ||
        github.event_name == 'workflow_dispatch'
      )
    strategy:
      fail-fast: false
      matrix:
        version: ['8.5']
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
        exclude:
          - version: ${{ github.event_name == 'push' && needs.changes.outputs.frankenphp-8_4 != 'true' && '8.4' || 'never' }}
          - version: ${{ github.event_name == 'push' && needs.changes.outputs.frankenphp-8_5 != 'true' && '8.5' || 'never' }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frankenphp/${{ matrix.version }}/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.NAMESPACE }}/frankenphp,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Sanitize platform for artifact name
        id: sanitize
        run: echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: frankenphp-${{ matrix.version }}-digest-${{ steps.sanitize.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── FrankenPHP (merge multi-arch manifest) ─────────────────────────────
  merge-frankenphp:
    needs: [build-frankenphp]
    if: |
      always() && needs.build-frankenphp.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['8.5']
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: frankenphp-${{ matrix.version }}-digest-*
          merge-multiple: true
          path: /tmp/digests
      - name: Validate digest count
        run: |
          digest_count=$(find /tmp/digests -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' ')
          if [ "$digest_count" -eq 0 ]; then
            echo "No digests for FrankenPHP ${{ matrix.version }} — build-frankenphp was skipped by change detection."
            exit 0
          fi
          if [ "$digest_count" -lt 2 ]; then
            echo "Only $digest_count digest for FrankenPHP ${{ matrix.version }} — need at least 2 for multi-arch." >&2
            echo "Refusing to publish a single-arch manifest under a multi-arch tag." >&2
            exit 1
          fi
          echo "has_digests=true" >> "$GITHUB_ENV"
      - name: Create multi-arch manifest
        if: env.has_digests == 'true'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.NAMESPACE }}/frankenphp:${{ matrix.version }} \
            $(printf '${{ env.NAMESPACE }}/frankenphp@sha256:%s ' *)
      - name: Inspect published manifest
        if: env.has_digests == 'true'
        run: |
          docker buildx imagetools inspect ${{ env.NAMESPACE }}/frankenphp:${{ matrix.version }}

  # ── kubectl ──────────────────────────────────────────────────────
  build-kubectl:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.kubectl == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: kubectl/Dockerfile
          push: true
          tags: ${{ env.NAMESPACE }}/kubectl:stable
