name: Build Docker images

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'   # daily: flutter freshness check (php/frankenphp rebuild lives in rebuild.yml)
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version to build (e.g. 3.41.1). Tags as both stable and version. Leave empty to build stable only.'
        required: false

permissions:
  packages: write

env:
  REGISTRY: ghcr.io
  NAMESPACE: ghcr.io/jpjonte

jobs:
  # ── Detect changed paths (push only) ─────────────────────────────
  changes:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      flutter: ${{ steps.filter.outputs.flutter }}
      php-8_5: ${{ steps.filter.outputs.php-8_5 }}
      frankenphp-8_5: ${{ steps.filter.outputs.frankenphp-8_5 }}
      forgejo-runner-12: ${{ steps.filter.outputs.forgejo-runner-12 }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            flutter:
              - 'flutter/**'
            php-8_5:
              - 'php/8.5/**'
              - 'php/scripts/**'
            frankenphp-8_5:
              - 'frankenphp/8.5/**'
              - 'php/scripts/**'
            forgejo-runner-12:
              - 'forgejo-runner/12/**'

  # ── Check for new Flutter stable version (schedule only) ─────────
  check-flutter:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check latest Flutter stable version
        id: check
        run: |
          VERSION=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json \
            | jq -r '.current_release.stable as $h | .releases[] | select(.hash==$h) | .version')
          echo "Latest stable Flutter version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if docker manifest inspect ${{ env.NAMESPACE }}/flutter:$VERSION > /dev/null 2>&1; then
            echo "Flutter $VERSION already exists in GHCR"
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New Flutter version: $VERSION"
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  # ── Flutter (per-platform, per-target build) ────────────────────
  build-flutter:
    needs: [changes, check-flutter]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.flutter == 'true') ||
        (github.event_name == 'schedule' && needs.check-flutter.outputs.build == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    strategy:
      fail-fast: false
      matrix:
        # Keep this target list in sync with the merge-flutter job below.
        target:
          - { name: base,        suffix: '' }
          - { name: base-ci,     suffix: '-ci' }
          - { name: android,     suffix: '-android' }
          - { name: android-ci,  suffix: '-android-ci' }
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine version
        id: version
        run: |
          VERSION="${{ needs.check-flutter.outputs.version || inputs.flutter_version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -s https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json \
              | jq -r '.current_release.stable as $h | .releases[] | select(.hash==$h) | .version')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Sanitize platform for artifact name
        id: sanitize
        run: echo "suffix=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: flutter/Dockerfile
          target: ${{ matrix.target.name }}
          platforms: ${{ matrix.platform }}
          build-args: |
            FLUTTER_VERSION=${{ steps.version.outputs.version }}
          outputs: type=image,name=${{ env.NAMESPACE }}/flutter,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v7
        with:
          name: flutter-${{ matrix.target.name }}-digest-${{ steps.sanitize.outputs.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Flutter (merge multi-arch manifests, one per target) ────────
  merge-flutter:
    needs: [build-flutter]
    if: |
      always() && needs.build-flutter.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep this target list in sync with the build-flutter job above.
        target:
          - { name: base,        suffix: '' }
          - { name: base-ci,     suffix: '-ci' }
          - { name: android,     suffix: '-android' }
          - { name: android-ci,  suffix: '-android-ci' }
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@v8
        with:
          pattern: flutter-${{ matrix.target.name }}-digest-*
          merge-multiple: true
          path: /tmp/digests
      - name: Determine tags
        id: tags
        run: |
          VERSION="${{ needs.build-flutter.outputs.version }}"
          SUFFIX="${{ matrix.target.suffix }}"
          echo "tags=${{ env.NAMESPACE }}/flutter:stable${SUFFIX},${{ env.NAMESPACE }}/flutter:${VERSION}${SUFFIX}" >> "$GITHUB_OUTPUT"
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          TAGS=$(echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' | sed 's/^/-t /' | tr '\n' ' ')
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.NAMESPACE }}/flutter@sha256:%s ' *)
      - name: Inspect published manifest
        run: |
          docker buildx imagetools inspect ${{ env.NAMESPACE }}/flutter:stable${{ matrix.target.suffix }}

  # ── PHP and FrankenPHP (via the reusable _image workflow) ────
  # On push, each is gated independently by change detection; workflow_dispatch
  # rebuilds both. The weekly OS-patch rebuild lives in rebuild.yml.
  php:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.php-8_5 == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    uses: ./.github/workflows/_image.yml
    with:
      name: php
      version: '8.5'

  frankenphp:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.frankenphp-8_5 == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    uses: ./.github/workflows/_image.yml
    with:
      name: frankenphp
      version: '8.5'

  # Built by the generic _image.yml workflow (name + version → <name>/<version>/Dockerfile).
  forgejo-runner:
    needs: [changes]
    if: |
      always() && (
        (github.event_name == 'push' && needs.changes.outputs.forgejo-runner-12 == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    uses: ./.github/workflows/_image.yml
    with:
      name: forgejo-runner
      version: '12'
